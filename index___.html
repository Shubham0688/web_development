<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Speaking Lyrics - Hindi Song</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    color: white;
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientShift {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

#lyricsContainer {
    position: relative;
    width: 90%;
    max-width: 800px;
    text-align: center;
}

#lyrics {
    position: relative;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
    animation: float 3s ease-in-out infinite;
    line-height: 1.6;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
}

@keyframes float {
    0% {
        transform: translateY(0px) scale(1);
        opacity: 0.8;
    }
    50% {
        transform: translateY(-20px) scale(1.05);
        opacity: 1;
    }
    100% {
        transform: translateY(0px) scale(1);
        opacity: 0.8;
    }
}

#status {
    margin-top: 30px;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.9);
}


.button-container {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 30px;
    flex-wrap: wrap;
}

button {
    padding: 14px 35px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

#playBtn {
    background: linear-gradient(135deg, #ff6b6b, #ff8e53);
    color: white;
}

#playBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
}

#playBtn:active {
    transform: scale(0.95);
}

#stopBtn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

#stopBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

#stopBtn:active {
    transform: scale(0.95);
}

.progress-bar {
    margin-top: 20px;
    width: 100%;
    height: 8px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 10px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6b6b, #ff8e53);
    width: 0%;
    transition: width 0.3s ease;
}

</style>
</head>

<body>

<div id="lyricsContainer">
    <div id="lyrics">Click Play to Start</div>
    <div id="status"></div>
    
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    
    <div class="button-container">
        <button id="playBtn" onclick="startSong()">▶ Play</button>
        <button id="stopBtn" onclick="stopSong()">⏹ Stop</button>
    </div>
</div>

<script>

const lines = [
    "Mujh mein safar tu karti rahe",
    "Har ek lamha tu karti nahe",
    "Tujhe sath dekh kar khil jata hoon main",
    "Meri har saans mein tera naam hai"
];

let currentLineIndex = 0;
let isPlaying = false;
let currentUtterance = null;

function startSong() {
    if (isPlaying) return;
    
    isPlaying = true;
    currentLineIndex = 0;
    document.getElementById('playBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    speakLine();
}

function stopSong() {
    isPlaying = false;
    currentLineIndex = 0;
    window.speechSynthesis.cancel();
    document.getElementById('lyrics').innerText = 'Click Play to Start';
    document.getElementById('status').innerText = '';
    document.getElementById('playBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    updateProgressBar();
}

function speakLine() {
    if (currentLineIndex < lines.length && isPlaying) {
        const line = lines[currentLineIndex];
        document.getElementById('lyrics').innerText = line;
        
        const lineNumber = currentLineIndex + 1;
        document.getElementById('status').innerText = `Line ${lineNumber} of ${lines.length}`;
        updateProgressBar();
        
        currentUtterance = new SpeechSynthesisUtterance(line);
        currentUtterance.lang = 'hi-IN';
        currentUtterance.rate = 0.85;
        currentUtterance.pitch = 1;
        currentUtterance.volume = 1;
        
        currentUtterance.onend = function() {
            if (isPlaying) {
                currentLineIndex++;
                setTimeout(speakLine, 800);
            }
        };
        
        currentUtterance.onerror = function(event) {
            console.log('Speech error:', event.error);
            currentLineIndex++;
            if (isPlaying) {
                setTimeout(speakLine, 800);
            }
        };
        
        window.speechSynthesis.speak(currentUtterance);
    } else if (currentLineIndex >= lines.length && isPlaying) {
        document.getElementById('lyrics').innerText = '🎵 Thank You! 🎵';
        document.getElementById('status').innerText = 'Song Completed';
        isPlaying = false;
        document.getElementById('playBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    }
}

function updateProgressBar() {
    if (lines.length > 0) {
        const progress = (currentLineIndex / lines.length) * 100;
        document.querySelector('.progress-fill').style.width = progress + '%';
    }
}

</script>

</body>
</html>
