<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Speaking Floating Lyrics</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    overflow:hidden;
    color:white;
    text-align:center;
    font-family:Arial;
}

#lyrics{
    position:absolute;
    top:40%;
    width:100%;
    font-size:28px;
    font-weight:bold;
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-25px);}
    100%{transform:translateY(0);}
}

button{
    position:absolute;
    bottom:50px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    background:#ff416c;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="lyrics">Click Play</div>
<button onclick="start()">▶ Play</button>
